<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA8C1A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B1428;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="400" fill="#FFFFFF"/>
  
  <!-- Icon/Mark - Centered -->
  <g id="mark" transform="translate(75, 40)" filter="url(#shadow)">
    <!-- Shield shape -->
    <path d="M 0 0 L 0 60 Q 0 85 35 105 Q 70 85 70 60 L 70 0 Z" fill="url(#redGradient)" stroke="#8B1428" stroke-width="2"/>
    
    <!-- Newspaper fold accent -->
    <g transform="translate(35, 35)">
      <path d="M -15 -12 L -5 -12 L -5 18 L -15 18 Z" fill="#FFFFFF" opacity="0.9"/>
      <path d="M 3 -12 L 15 -12 L 15 18 L 3 18 Z" fill="#FFFFFF" opacity="0.85"/>
      <line x1="-2" y1="-12" x2="-2" y2="18" stroke="url(#goldGradient)" stroke-width="1.5"/>
    </g>
    
    <!-- Gold crown accent -->
    <g transform="translate(35, 15)">
      <path d="M -10 5 L -6 0 L 0 -2 L 6 0 L 10 5 Z" fill="url(#goldGradient)" stroke="#AA8C1A" stroke-width="1"/>
      <circle cx="-6" cy="0" r="2" fill="#FFFFFF"/>
      <circle cx="0" cy="-2" r="2" fill="#FFFFFF"/>
      <circle cx="6" cy="0" r="2" fill="#FFFFFF"/>
    </g>
  </g>
  
  <!-- Typography - Stacked -->
  <g id="typography">
    <!-- Main Title -->
    <text x="150" y="200" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.5">
      TRANSILVANIA
    </text>
    
    <!-- Subtitle -->
    <text x="150" y="250" font-family="Georgia, serif" font-size="38" font-style="italic" fill="#C41E3A" text-anchor="middle" letter-spacing="1.5">
      TIMES
    </text>
    
    <!-- Decorative lines -->
    <line x1="50" y1="265" x2="250" y2="265" stroke="url(#goldGradient)" stroke-width="2"/>
    
    <!-- Tagline -->
    <text x="150" y="310" font-family="Georgia, serif" font-size="12" fill="#666666" text-anchor="middle" letter-spacing="0.5">
      News from the Heart of
    </text>
    <text x="150" y="330" font-family="Georgia, serif" font-size="12" fill="#666666" text-anchor="middle" letter-spacing="0.5">
      Transylvania
    </text>
  </g>
</svg>