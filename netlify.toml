# SPA routing — serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Register edge function for blog bot interception
[[edge_functions]]
  function = "og-rewrite"
  path = "/blog/*"
# Force HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Redirect www to non-www (or vice versa)
[[redirects]]
  from = "https://www.transilvaniatimes.com/*"
  to = "https://transilvaniatimes.com/:splat"
  status = 301
  force = true
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self' https://zimpimoierpsocnmnizm.supabase.co; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
